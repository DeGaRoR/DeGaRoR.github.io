<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTIS Title v3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baumans&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0612; }
  .scene {
    position: absolute; inset: 0; overflow: hidden;
    background: linear-gradient(180deg,
      #1a1028 0%, #221338 8%, #2e1840 16%, #3e1e4a 24%,
      #5a2858 32%, #6e2c5c 40%, #8a3060 48%, #a84058 55%,
      #c05048 62%, #d06838 70%, #d88040 78%, #e8a040 86%,
      #e8b858 93%, #e8c870 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .terrain-far {
    position: absolute; bottom: 0; left: 0; right: 0; height: 28%;
    background: linear-gradient(180deg, transparent 0%, #2a1530 15%, #1e0e22 60%, #140a18 100%);
    clip-path: polygon(0% 35%,3% 30%,7% 32%,12% 25%,18% 28%,22% 20%,28% 23%,33% 18%,38% 22%,42% 15%,48% 20%,52% 12%,58% 18%,62% 14%,68% 20%,72% 16%,78% 22%,83% 18%,88% 24%,92% 20%,96% 26%,100% 22%,100% 100%,0% 100%);
  }
  .terrain-near {
    position: absolute; bottom: 0; left: 0; right: 0; height: 18%;
    background: linear-gradient(180deg, #1a0c20 0%, #120818 50%, #0a0410 100%);
    clip-path: polygon(0% 40%,5% 35%,10% 38%,18% 30%,25% 35%,32% 28%,40% 32%,48% 25%,55% 30%,62% 22%,70% 28%,78% 24%,85% 30%,92% 26%,100% 32%,100% 100%,0% 100%);
  }
  .vent {
    position: absolute; bottom: 14%; width: 40px; height: 80px;
    background: radial-gradient(ellipse at bottom, rgba(240,120,50,0.12) 0%, transparent 70%);
    animation: vp 4s ease-in-out infinite;
  }
  .vent:nth-child(1){left:22%;animation-delay:-1s}
  .vent:nth-child(2){left:65%;animation-delay:-2.5s;width:30px;height:60px}
  .vent:nth-child(3){left:78%;animation-delay:-.5s;width:25px;height:50px}
  @keyframes vp{0%,100%{opacity:.5}50%{opacity:1}}
  .title-wrap {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center; margin-top: -6vh;
  }
  .grid-field {
    position: absolute; width: 800px; height: 240px;
    top: 50%; left: 50%; transform: translate(-50%,-55%);
    pointer-events: none; z-index: 5;
    mask-image: radial-gradient(ellipse 400px 120px at center, black 40%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 400px 120px at center, black 40%, transparent 100%);
  }
  .pipe-anim { opacity: 0; }
  .pipe-anim.on { animation: slam .14s cubic-bezier(.2,.8,.3,1.15) forwards; }
  @keyframes slam {
    0%  { opacity:0; transform:scale(.6) translateY(8px); }
    65% { opacity:1; transform:scale(1.06) translateY(-1px); }
    100%{ opacity:1; transform:scale(1) translateY(0); }
  }
  .flange-anim { opacity: 0; }
  .flange-anim.on { animation: fpop .1s ease-out forwards; }
  @keyframes fpop { 0%{opacity:0;transform:scale(.4)} 100%{opacity:1;transform:scale(1)} }
  .tag-wrap {
    opacity:0; transform:rotate(-2.5deg) translateY(-8px);
    transition: opacity .35s, transform .45s cubic-bezier(.3,1.3,.4,1);
  }
  .tag-wrap.visible { opacity:1; transform:rotate(-2.5deg) translateY(0); }
  /* Buttons: aligned as SVG unit-style panels */
  .menu-wrap {
    display:flex; align-items:center; gap:14px; margin-top:38px;
    opacity:0; transform:translateY(12px);
    transition: opacity .4s .3s, transform .4s .3s ease-out;
  }
  .menu-wrap.visible { opacity:1; transform:translateY(0); }
  .menu-wrap svg { cursor: pointer; transition: transform .15s ease-out; }
  .menu-wrap svg:hover { transform: scale(1.06); }
  .menu-wrap svg:hover .btn-body { filter: brightness(1.15); }
  .menu-wrap svg:hover .btn-led { fill: #22c55e; opacity: 0.9; }
  .menu-wrap svg:hover .btn-vp { fill: #0a2020; }
  .menu-wrap svg .btn-vp { transition: fill .2s; }
  .menu-wrap svg .btn-led { transition: fill .15s, opacity .15s; }
  .replay-btn {
    position:fixed; bottom:20px; right:20px; z-index:100;
    background:rgba(55,65,81,.5); border:1px solid #6b7280; border-radius:4px;
    color:#9ca3af; font-size:11px; padding:6px 12px; cursor:pointer; font-family:monospace;
  }
  .replay-btn:hover { background:rgba(75,85,99,.7); color:#e2e8f0; }
</style>
</head>

<button class="replay-btn" onclick="go()">↻ Replay</button>

<script>
const sc=document.getElementById('stars'),sx=sc.getContext('2d');
function rz(){sc.width=innerWidth;sc.height=innerHeight;ds();}
function ds(){sx.clearRect(0,0,sc.width,sc.height);for(let i=0;i<90;i++){const x=Math.random()*sc.width,y=Math.random()*sc.height*.45,r=Math.random()*1.1+.3,a=Math.random()*.35+.08;sx.beginPath();sx.arc(x,y,r,0,Math.PI*2);sx.fillStyle=`rgba(220,210,255,${a})`;sx.fill();}}
addEventListener('resize',rz);rz();

function go(){
  const pp=document.querySelectorAll('.pipe-anim');
  const ff=document.querySelectorAll('.flange-anim');
  const tg=document.getElementById('tagWrap');
  const mn=document.getElementById('menuBtns');
  const ld=document.getElementById('diagLed');
  pp.forEach(p=>p.classList.remove('on'));
  ff.forEach(f=>f.classList.remove('on'));
  tg.classList.remove('visible');
  mn.classList.remove('visible');
  ld.setAttribute('fill','#ef4444');
  void document.body.offsetHeight;
  const t0=250,dt=70;
  pp.forEach(p=>{const i=+p.getAttribute('data-i');setTimeout(()=>p.classList.add('on'),t0+i*dt);});
  ff.forEach(f=>{const d=parseFloat(f.getAttribute('data-d'));setTimeout(()=>f.classList.add('on'),t0+d*dt+50);});
  const tL=t0+12*dt+180;
  setTimeout(()=>{ld.setAttribute('fill','#fbbf24');setTimeout(()=>{ld.setAttribute('fill','#22c55e');ld.setAttribute('opacity','1');},120);},tL);
  setTimeout(()=>tg.classList.add('visible'),tL+250);
  setTimeout(()=>mn.classList.add('visible'),tL+550);
}
addEventListener('load',()=>setTimeout(go,150));
</script>
