<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PTIS Ragtag — Complete Animated (28 units)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e14;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif}
.ctl{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#0f172a;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:10}
.ctl button{background:#1e293b;color:#e2e8f0;border:1px solid #334155;padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.ctl button:hover{background:#334155}.ctl button.on{background:#3b82f6;border-color:#3b82f6}
.ctl .sp{padding:5px 8px;min-width:28px;text-align:center}.ctl .sp.on{background:#f59e0b;border-color:#f59e0b;color:#0b0e14}
.inf{font-size:10px;color:#64748b;margin-left:auto;font-family:monospace}.inf b{color:#94a3b8;font-weight:400}
</style>
</head>
<body>
<div class="ctl">
<button id="bp" onclick="C.mode='playing';C._lw=performance.now();C._ac=0;ub()">▶ Play</button>
<button id="ba" onclick="C.mode='paused';ub()" class="on">⏸ Pause</button>
<button id="bs" onclick="C.t+=C.dt;C.f++;C.mode='paused';ub()">⏭ Step</button>
<span style="color:#475569;font-size:10px">Speed:</span>
<button class="sp on" onclick="ss(0)" id="s0">1×</button>
<button class="sp" onclick="ss(1)" id="s1">4×</button>
<button class="sp" onclick="ss(2)" id="s2">16×</button>
<div class="inf">RAGTAG THEME — 28 units &nbsp;|&nbsp; t=<b id="tv">43200</b>s frame=<b id="fv">0</b> <b id="mv">PAUSED</b></div>
</div>
<svg id="cv" xmlns="http://www.w3.org/2000/svg" width="1140" height="1260" style="display:block;padding:8px 16px">
<defs>
<pattern id="g" width="48" height="48" patternUnits="userSpaceOnUse"><rect width="48" height="48" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.15"/></pattern>
<linearGradient id="m" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#374151"/><stop offset="50%" stop-color="#4b5563"/><stop offset="100%" stop-color="#374151"/></linearGradient>
<linearGradient id="mH" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#374151"/><stop offset="40%" stop-color="#6b7280"/><stop offset="100%" stop-color="#374151"/></linearGradient>
<linearGradient id="pG" x1="0" y1="0" x2=".3" y2="1"><stop offset="0%" stop-color="#059669"/><stop offset="50%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></linearGradient>
<linearGradient id="pP" x1="0" y1="0" x2=".3" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="50%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
<linearGradient id="pB" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="50%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
<linearGradient id="pT" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#0d9488"/><stop offset="50%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
<linearGradient id="pR" x1="0" y1="0" x2=".3" y2="1"><stop offset="0%" stop-color="#dc2626"/><stop offset="50%" stop-color="#ef4444"/><stop offset="100%" stop-color="#b91c1c"/></linearGradient>
<linearGradient id="pC" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#0891b2"/><stop offset="50%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0e7490"/></linearGradient>
<linearGradient id="pA" x1="0" y1="0" x2=".3" y2="1"><stop offset="0%" stop-color="#d97706"/><stop offset="50%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
<clipPath id="cfD"><path d="M28,24 Q28,8 48,8 Q68,8 68,24 L68,120 Q68,136 48,136 Q28,136 28,120 Z"/></clipPath>
<clipPath id="cTk"><path d="M18,12 Q4,12 4,44 Q4,76 18,76 L126,76 Q140,76 140,44 Q140,12 126,12 Z"/></clipPath>
<clipPath id="cOt"><path d="M14,14 L14,68 Q14,82 72,82 Q130,82 130,68 L130,14 Z"/></clipPath>
</defs>
<rect width="1140" height="1260" fill="#0b0e14"/><rect width="1140" height="1260" fill="url(#g)"/>
</svg>
<script>
const PS=[5000,3000,1500],C={t:43200,f:0,mode:'paused',dt:3600,sp:0,_lw:0,_ac:0};
function ss(s){C.sp=s;document.querySelectorAll('.sp').forEach((b,i)=>b.classList.toggle('on',i===s))}
function ub(){document.getElementById('bp').classList.toggle('on',C.mode==='playing');document.getElementById('ba').classList.toggle('on',C.mode==='paused');document.getElementById('mv').textContent=C.mode==='playing'?'PLAYING':'PAUSED'}
function E(t,a){const e=document.createElementNS('http://www.w3.org/2000/svg',t);for(const[k,v]of Object.entries(a||{})){if(k==='text'){e.textContent=v;continue}e.setAttribute(k,v)}return e}

// Shared helpers
const led=(g,x,y,at,c='#22c55e')=>{const p=((at*1.5)%1);g.appendChild(E('circle',{cx:x,cy:y,r:2.5,fill:c,opacity:p<.5?.7:.45}))};
const bolt=(g,x,y)=>g.appendChild(E('circle',{cx:x,cy:y,r:2,fill:'#1f2937',stroke:'#6b7280','stroke-width':1}));
const boltS=(g,x,y)=>g.appendChild(E('circle',{cx:x,cy:y,r:1.5,fill:'#374151',stroke:'#6b7280','stroke-width':.8}));
const chip=(g,x,y,w=8,h=4)=>g.appendChild(E('rect',{x,y,width:w,height:h,rx:1,fill:'url(#m)',opacity:.6}));
const pipe=(g,x,y,w,h=12)=>g.appendChild(E('rect',{x,y,width:w,height:h,rx:4,fill:'url(#mH)',stroke:'#4b5563','stroke-width':2}));
const pipeL=(g,x1,y1,x2,y2)=>{g.appendChild(E('line',{x1,y1,x2,y2,stroke:'#4b5563','stroke-width':4}));g.appendChild(E('line',{x1,y1,x2,y2,stroke:'url(#m)','stroke-width':2.5}))};
const foot=(g,x,yB,w=12)=>{
// Filled metal trapezoid support, centered at x, top at yB
// w = top width, bottom is w+8
const hw=w/2, bw=hw+4;
g.appendChild(E('path',{d:`M${x-hw},${yB} L${x-bw},${yB+10} L${x+bw},${yB+10} L${x+hw},${yB} Z`,fill:'url(#m)',stroke:'#374151','stroke-width':1,'stroke-linejoin':'round'}));
};
const vp=(g,cx,cy,r,dk='#0f0820',rm='#4c1d95')=>{g.appendChild(E('circle',{cx,cy,r,fill:dk,stroke:rm,'stroke-width':2}));g.appendChild(E('path',{d:`M${cx-6},${cy-6}Q${cx-4},${cy-8} ${cx-2},${cy-6}`,fill:'none',stroke:'#fff','stroke-width':.8,opacity:.12}))};
const vpR=(g,x,y,w,h,dk='#0a1a1a',rm='#134e4a')=>{g.appendChild(E('rect',{x,y,width:w,height:h,rx:5,fill:dk,stroke:rm,'stroke-width':2}));g.appendChild(E('path',{d:`M${x+4},${y+4}Q${x+8},${y+2} ${x+12},${y+4}`,fill:'none',stroke:'#fff','stroke-width':.8,opacity:.1}))};
const amb=(g,x,y,w=16,h=14)=>{g.appendChild(E('rect',{x,y,width:w,height:h,rx:3,fill:'#78350f',stroke:'#92400e','stroke-width':2}));g.appendChild(E('circle',{cx:x+w/2,cy:y+h/2,r:2.5,fill:'#fbbf24',opacity:.3}))};
const lbl=(g,x,y,t,f='#94a3b8')=>g.appendChild(E('text',{x,y,'text-anchor':'middle','font-size':8,'font-weight':600,fill:f,'font-family':'Inter,system-ui',text:t}));
const cat=(g,y,t,f,c)=>{g.appendChild(E('rect',{x:12,y,width:1116,height:16,rx:3,fill:c,opacity:.06}));g.appendChild(E('text',{x:20,y:y+12,'font-size':10,'font-weight':700,fill:f,'font-family':'Inter,system-ui',text:t}))};

// Bubble system
const BUB=[{x:-10,r:4.5,ph:0},{x:6,r:3.5,ph:.25},{x:-4,r:4,ph:.5},{x:10,r:3,ph:.7},{x:2,r:3.5,ph:.35},{x:-8,r:2.5,ph:.85}];
function bubs(g,cx,yT,yB,at){BUB.forEach(b=>{const cy=.5+b.ph*.2,p=((at/cy+b.ph)%1),y=yB+(yT-yB)*p,o=p<.8?.45:.45*(1-(p-.8)/.2);if(o>.02)g.appendChild(E('circle',{cx:cx+b.x,cy:y,r:b.r,fill:b.ph<.5?'#fbbf24':'#f97316',opacity:o}))})}

// Shared reactor vessel (A1)
function rVessel(g,at){
  g.appendChild(E('rect',{x:12,y:4,width:72,height:68,rx:14,fill:'url(#pR)',stroke:'#7f1d1d','stroke-width':2.5}));
  chip(g,64,12);chip(g,16,56,7,4);vp(g,48,36,16,'#1a0505','#7f1d1d');bubs(g,48,20,50,at);
  bolt(g,18,12);bolt(g,78,12);bolt(g,18,66);bolt(g,78,66);
  [12,20,28,36].forEach(x=>g.appendChild(E('line',{x1:x,y1:62,x2:x+6,y2:68,stroke:'#fbbf24','stroke-width':1.5,opacity:.12})));
  pipe(g,-4,18,18,10);pipe(g,82,18,16,10);
}
function coolCoil(g){g.appendChild(E('path',{d:'M0,120 L14,120 L14,100 L22,100 L22,120 L30,120 L30,100 L38,100 L38,120 L46,120 L46,100 L54,100 L54,120 L62,120 L62,100 L70,100 L70,120 L78,120 L78,100 L86,100 L86,120 L96,120',fill:'none',stroke:'#67e8f9','stroke-width':2.5,'stroke-linecap':'round','stroke-linejoin':'round',opacity:.6}))}

function render(at){
const svg=document.getElementById('cv');
while(svg.children.length>3)svg.removeChild(svg.lastChild);
const g=E('g');

// ═══ BOUNDARY ═══
cat(g,4,'BOUNDARY','#6ee7b7','#10b981');

// Source
const src=E('g',{transform:'translate(24,28)'});
src.appendChild(E('circle',{cx:38,cy:48,r:28,fill:'url(#pG)',stroke:'#065f46','stroke-width':2.5}));chip(src,50,30);
vp(src,38,48,14,'#052e16','#065f46');
const fOp=.35+Math.sin(at*Math.PI*2*2)*.2;
src.appendChild(E('line',{x1:28,y1:48,x2:46,y2:48,stroke:'#6ee7b7','stroke-width':2.5,opacity:fOp,'stroke-linecap':'round'}));
src.appendChild(E('polygon',{points:'43,44 49,48 43,52',fill:'#6ee7b7',opacity:fOp}));
[16,60].forEach(x=>[34,62].forEach(y=>bolt(src,x,y)));pipe(src,64,42,32);led(src,54,66,at);lbl(src,48,100,'Source','#6ee7b7');g.appendChild(src);

// Atm Intake — bell mouth with rushing wind
const ai=E('g',{transform:'translate(148,28)'});
// Bell mouth body (wide left, narrows right) — painted green
ai.appendChild(E('path',{d:'M4,10 Q2,48 4,86 L56,66 Q62,48 56,30 Z',fill:'url(#pG)',stroke:'#065f46','stroke-width':2.5,'stroke-linejoin':'round'}));
// Open mouth edge — dashed to show it's open to atmosphere
ai.appendChild(E('line',{x1:4,y1:10,x2:4,y2:86,stroke:'#6ee7b7','stroke-width':2,'stroke-dasharray':'3 3',opacity:.4}));
// Intake louver slats
[24,36,48,60,72].forEach(y=>{
  const x2=32+(48-Math.abs(y-48))*0.4;
  ai.appendChild(E('line',{x1:8,y1:y,x2:x2,y2:y,stroke:'#065f46','stroke-width':1.5,opacity:.35}));
});
// Animated wind streaks rushing in (converging into the pipe)
const aiPh=((at*2.5)%1);
[0,0.2,0.4,0.6,0.8].forEach((ph,i)=>{
  const p=((aiPh+ph)%1);
  // Streaks travel from left to right, converging toward center
  const sx=-10+p*60;
  const yOff=(i-2)*14;
  const sy=48+yOff*(1-p*0.6); // converge toward center as they move right
  const op=p<0.2?p*4:p>0.8?(1-p)*4:0.5;
  if(op>0.02){
    ai.appendChild(E('line',{x1:sx-8,y1:sy,x2:sx,y2:sy,stroke:'#6ee7b7','stroke-width':1.5,'stroke-linecap':'round',opacity:op}));
    // Small arrow head
    ai.appendChild(E('polygon',{points:`${sx},${sy-2} ${sx+4},${sy} ${sx},${sy+2}`,fill:'#6ee7b7',opacity:op*0.7}));
  }
});
chip(ai,46,34,6,3);bolt(ai,50,38);bolt(ai,50,58);
pipe(ai,54,42,42);led(ai,36,74,at);lbl(ai,48,100,'Atm. Intake','#6ee7b7');g.appendChild(ai);

// Sink
const sk=E('g',{transform:'translate(272,28)'});
sk.appendChild(E('rect',{x:32,y:6,width:32,height:68,rx:4,fill:'url(#pG)',stroke:'#065f46','stroke-width':2.5}));chip(sk,52,20);
sk.appendChild(E('rect',{x:28,y:4,width:40,height:6,rx:2,fill:'url(#mH)',stroke:'#4b5563','stroke-width':1.5}));
sk.appendChild(E('path',{d:'M30,2 L48,-2 L66,2',fill:'none',stroke:'#4b5563','stroke-width':2,'stroke-linecap':'round'}));
sk.appendChild(E('line',{x1:26,y1:74,x2:70,y2:74,stroke:'#065f46','stroke-width':2,'stroke-linecap':'round',opacity:.5}));
bolt(sk,36,16);bolt(sk,60,16);bolt(sk,36,62);bolt(sk,60,62);pipe(sk,-4,42,38);
[0,.33,.66].forEach((ph,i)=>{const p=((at/.8+ph)%1),sy=-8-p*24,so=p<.6?.12:.12*(1-(p-.6)/.4),sr=4+p*4;if(so>.01)sk.appendChild(E('circle',{cx:48+i*4-4,cy:sy,r:sr,fill:'#6b7280',opacity:so}))});
led(sk,56,56,at);lbl(sk,48,100,'Sink','#6ee7b7');g.appendChild(sk);

// Reservoir
const rs=E('g',{transform:'translate(396,28)'});
rs.appendChild(E('line',{x1:10,y1:72,x2:70,y2:72,stroke:'#4b5563','stroke-width':2,'stroke-linecap':'round'}));
[16,28,40,52].forEach(x=>rs.appendChild(E('line',{x1:x,y1:76,x2:x+8,y2:84,stroke:'#4b5563','stroke-width':.8,opacity:.12})));
rs.appendChild(E('line',{x1:40,y1:72,x2:40,y2:88,stroke:'#4b5563','stroke-width':4,opacity:.3}));
rs.appendChild(E('rect',{x:34,y:36,width:12,height:36,rx:2,fill:'url(#pG)',stroke:'#065f46','stroke-width':2}));
[62,50].forEach(y=>{rs.appendChild(E('circle',{cx:40,cy:y,r:5,fill:'#059669',stroke:'#065f46','stroke-width':2}));rs.appendChild(E('circle',{cx:40,cy:y,r:2,fill:'#065f46',opacity:.5}))});
rs.appendChild(E('rect',{x:28,y:32,width:24,height:10,rx:3,fill:'url(#pG)',stroke:'#065f46','stroke-width':2}));
rs.appendChild(E('line',{x1:28,y1:37,x2:12,y2:37,stroke:'#065f46','stroke-width':3}));
rs.appendChild(E('circle',{cx:20,cy:37,r:4,fill:'#059669',stroke:'#065f46','stroke-width':1.5}));
rs.appendChild(E('rect',{x:6,y:33,width:5,height:8,rx:1,fill:'url(#m)',opacity:.5}));
rs.appendChild(E('line',{x1:52,y1:37,x2:68,y2:37,stroke:'#065f46','stroke-width':3}));
rs.appendChild(E('circle',{cx:60,cy:37,r:4,fill:'#059669',stroke:'#065f46','stroke-width':1.5}));
pipe(rs,66,34,30,10);
rs.appendChild(E('line',{x1:40,y1:32,x2:40,y2:16,stroke:'#065f46','stroke-width':4}));
rs.appendChild(E('circle',{cx:40,cy:20,r:4,fill:'#059669',stroke:'#065f46','stroke-width':1.5}));
rs.appendChild(E('rect',{x:34,y:6,width:12,height:8,rx:3,fill:'url(#pG)',stroke:'#065f46','stroke-width':1.5}));
[0,.4,.7].forEach(ph=>{const p=((at/.6+ph)%1),wy=4-p*12,wo=p<.5?.2:.2*(1-(p-.5)/.5);if(wo>.01)rs.appendChild(E('circle',{cx:38+Math.sin(ph*10)*4,cy:wy,r:1.5,fill:'#6ee7b7',opacity:wo}))});
chip(rs,44,40,5,3);led(rs,60,48,at);lbl(rs,48,100,'Reservoir','#6ee7b7');g.appendChild(rs);

// ═══ PRESSURE ═══
cat(g,148,'PRESSURE','#c4b5fd','#8b5cf6');

// Pump
const pm=E('g',{transform:'translate(24,168)'});foot(pm,26,74);foot(pm,60,74);
pm.appendChild(E('rect',{x:14,y:16,width:58,height:58,rx:10,fill:'url(#pP)',stroke:'#4c1d95','stroke-width':2.5}));chip(pm,56,22);
pm.appendChild(E('line',{x1:14,y1:44,x2:72,y2:44,stroke:'#4c1d95','stroke-width':1,opacity:.5}));
[20,66].forEach(x=>[22,66].forEach(y=>bolt(pm,x,y)));vp(pm,43,36,14);
const pa=((at*2.5)%1)*360,piG=E('g',{transform:`rotate(${pa.toFixed(1)},43,36)`});
piG.appendChild(E('line',{x1:43,y1:24,x2:43,y2:48,stroke:'#c4b5fd','stroke-width':2.5,opacity:.6,'stroke-linecap':'round'}));
piG.appendChild(E('line',{x1:31,y1:36,x2:55,y2:36,stroke:'#c4b5fd','stroke-width':2.5,opacity:.6,'stroke-linecap':'round'}));
piG.appendChild(E('line',{x1:34,y1:28,x2:52,y2:44,stroke:'#c4b5fd','stroke-width':2,opacity:.45,'stroke-linecap':'round'}));
piG.appendChild(E('line',{x1:34,y1:44,x2:52,y2:28,stroke:'#c4b5fd','stroke-width':2,opacity:.45,'stroke-linecap':'round'}));
piG.appendChild(E('circle',{cx:43,cy:36,r:4,fill:'#a78bfa',opacity:.5}));pm.appendChild(piG);
pipe(pm,-4,39,20);pipe(pm,70,39,28);
pm.appendChild(E('rect',{x:30,y:2,width:26,height:16,rx:6,fill:'url(#pP)',stroke:'#4c1d95','stroke-width':2}));
[35,39,43,47,51].forEach(x=>pm.appendChild(E('line',{x1:x,y1:6,x2:x,y2:14,stroke:'#4c1d95','stroke-width':1.5,opacity:.5})));
led(pm,62,56,at);lbl(pm,48,100,'Pump','#c4b5fd');g.appendChild(pm);

// Compressor
const cm=E('g',{transform:'translate(148,168)'});foot(cm,22,66);foot(cm,58,66);
cm.appendChild(E('rect',{x:10,y:18,width:60,height:48,rx:6,fill:'url(#pP)',stroke:'#4c1d95','stroke-width':2.5}));chip(cm,52,24);
cm.appendChild(E('rect',{x:20,y:26,width:36,height:32,rx:5,fill:'#0f0820',stroke:'#4c1d95','stroke-width':2}));
const cpPh=((at*1.5)%1),cpX=32+Math.sin(cpPh*Math.PI*2)*6;
cm.appendChild(E('rect',{x:cpX,y:32,width:6,height:20,rx:1.5,fill:'#c4b5fd',opacity:.35}));
const ckA=cpPh*Math.PI*2;cm.appendChild(E('line',{x1:cpX+6,y1:42,x2:56+Math.cos(ckA)*5,y2:42+Math.sin(ckA)*5,stroke:'#c4b5fd','stroke-width':1.5,opacity:.3}));
cm.appendChild(E('circle',{cx:56,cy:42,r:6,fill:'none',stroke:'#c4b5fd','stroke-width':1.5,opacity:.3}));
bolt(cm,16,24);bolt(cm,64,24);bolt(cm,16,60);bolt(cm,64,60);
pipe(cm,-4,39,16);pipe(cm,68,39,28);
cm.appendChild(E('rect',{x:30,y:4,width:26,height:16,rx:5,fill:'url(#pP)',stroke:'#4c1d95','stroke-width':2}));
[35,39,43,47,51].forEach(x=>cm.appendChild(E('line',{x1:x,y1:8,x2:x,y2:16,stroke:'#4c1d95','stroke-width':1.5,opacity:.5})));
led(cm,60,56,at);lbl(cm,48,100,'Compressor','#c4b5fd');g.appendChild(cm);

// Valve
const vl=E('g',{transform:'translate(272,168)'});
vl.appendChild(E('polygon',{points:'24,28 48,45 24,62',fill:'url(#pP)',stroke:'#4c1d95','stroke-width':2.5,'stroke-linejoin':'round'}));
vl.appendChild(E('polygon',{points:'72,28 48,45 72,62',fill:'url(#pP)',stroke:'#4c1d95','stroke-width':2.5,'stroke-linejoin':'round'}));
vl.appendChild(E('rect',{x:44,y:18,width:8,height:27,rx:2,fill:'url(#mH)',stroke:'#4b5563','stroke-width':1.5}));
vl.appendChild(E('circle',{cx:48,cy:14,r:8,fill:'url(#m)',stroke:'#4b5563','stroke-width':2}));
vl.appendChild(E('circle',{cx:48,cy:14,r:3,fill:'#1f2937',stroke:'#4b5563','stroke-width':1}));
pipe(vl,-4,39,30);pipe(vl,70,39,28);led(vl,66,56,at);lbl(vl,48,100,'Valve','#c4b5fd');g.appendChild(vl);

// Restriction
const rt=E('g',{transform:'translate(396,168)'});
rt.appendChild(E('rect',{x:38,y:16,width:20,height:64,rx:3,fill:'url(#pP)',stroke:'#4c1d95','stroke-width':2.5}));
rt.appendChild(E('ellipse',{cx:48,cy:45,rx:5,ry:12,fill:'#0b0e14',stroke:'#4c1d95','stroke-width':1.5}));
const hOp=.2+Math.sin(at*Math.PI*2*2)*.1;
rt.appendChild(E('line',{x1:24,y1:34,x2:40,y2:40,stroke:'#c4b5fd','stroke-width':1,opacity:hOp}));

function frame(now){

render(vt/C.dt);requestAnimationFrame(frame);
}
