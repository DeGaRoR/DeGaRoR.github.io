</style>
</head>
<body>
<div class="ctl">
<button id="bp" onclick="C.mode='playing';C._lw=performance.now();C._ac=0;ub()">▶ Play</button>
<button id="ba" onclick="C.mode='paused';ub()" class="on">⏸ Pause</button>
<button id="bs" onclick="C.t+=C.dt;C.f++;C.mode='paused';ub()">⏭ Step</button>
<span style="color:#475569;font-size:10px">Speed:</span>
<button class="sp on" onclick="ss(0)" id="s0">1×</button>
<button class="sp" onclick="ss(1)" id="s1">4×</button>
<button class="sp" onclick="ss(2)" id="s2">16×</button>
<div class="inf">ENGINEERING THEME — 28 units &nbsp;|&nbsp; t=<b id="tv">43200</b>s frame=<b id="fv">0</b> <b id="mv">PAUSED</b></div>
</div>
<svg id="cv" xmlns="http://www.w3.org/2000/svg" width="1140" height="1260" style="display:block;padding:8px 16px">
<defs>
<pattern id="g" width="48" height="48" patternUnits="userSpaceOnUse"><rect width="48" height="48" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.15"/></pattern>
<clipPath id="cfD"><path d="M28,24 Q28,8 48,8 Q68,8 68,24 L68,120 Q68,136 48,136 Q28,136 28,120 Z"/></clipPath>
<clipPath id="cCol"><path d="M26,20 Q26,6 48,6 Q70,6 70,20 L70,124 Q70,138 48,138 Q26,138 26,124 Z"/></clipPath>
<clipPath id="cTk"><path d="M18,12 Q4,12 4,44 Q4,76 18,76 L126,76 Q140,76 140,44 Q140,12 126,12 Z"/></clipPath>
<clipPath id="cOt"><path d="M14,14 L14,68 Q14,82 72,82 Q130,82 130,68 L130,14 Z"/></clipPath>
</defs>
<rect width="1140" height="1260" fill="#0b0e14"/><rect width="1140" height="1260" fill="url(#g)"/>
</svg>
<script>
const PS=[5000,3000,1500],C={t:43200,f:0,mode:'paused',dt:3600,sp:0,_lw:0,_ac:0};
function ss(s){C.sp=s;document.querySelectorAll('.sp').forEach((b,i)=>b.classList.toggle('on',i===s))}
function ub(){document.getElementById('bp').classList.toggle('on',C.mode==='playing');document.getElementById('ba').classList.toggle('on',C.mode==='paused');document.getElementById('mv').textContent=C.mode==='playing'?'PLAYING':'PAUSED'}
function E(t,a){const e=document.createElementNS('http://www.w3.org/2000/svg',t);for(const[k,v]of Object.entries(a||{})){if(k==='text'){e.textContent=v;continue}e.setAttribute(k,v)}return e}

// Engineering helpers — strokes only, category tinted fills
const S=(g,x1,y1,x2,y2,a)=>g.appendChild(E('line',{x1,y1,x2,y2,stroke:a?'#eab308':'#94a3b8','stroke-width':2.5,opacity:a?.7:1}));
const lbl=(g,x,y,t,f='#94a3b8')=>g.appendChild(E('text',{x,y,'text-anchor':'middle','font-size':8,'font-weight':600,fill:f,'font-family':'Inter,system-ui',text:t}));
const cat=(g,y,t,f,c)=>{g.appendChild(E('rect',{x:12,y,width:1116,height:16,rx:3,fill:c,opacity:.06}));g.appendChild(E('text',{x:20,y:y+12,'font-size':10,'font-weight':700,fill:f,'font-family':'Inter,system-ui',text:t}))};
const cnt=(g,x,y,w,h,c)=>g.appendChild(E('rect',{x,y,width:w,height:h,rx:6,fill:'none',stroke:c,'stroke-width':1,'stroke-dasharray':'4 3',opacity:.15}));

// Bubble outlines for engineering
const BUB=[{x:-10,r:3.5,ph:0},{x:6,r:3,ph:.25},{x:-4,r:3,ph:.5},{x:10,r:2.5,ph:.7},{x:2,r:3,ph:.35},{x:-8,r:2,ph:.85}];
function bubs(g,cx,yT,yB,at){BUB.forEach(b=>{const cy=.5+b.ph*.2,p=((at/cy+b.ph)%1),y=yB+(yT-yB)*p,o=p<.8?.4:.4*(1-(p-.8)/.2);if(o>.02)g.appendChild(E('circle',{cx:cx+b.x,cy:y,r:b.r,fill:'none',stroke:'#fca5a5','stroke-width':1.2,opacity:o}))})}

// Shared reactor vessel (A1)
function rV(g,at){
  g.appendChild(E('rect',{x:14,y:4,width:68,height:68,rx:14,fill:'#ef4444',opacity:.09}));
  g.appendChild(E('rect',{x:14,y:4,width:68,height:68,rx:14,fill:'none',stroke:'#fca5a5','stroke-width':2.5}));
  bubs(g,48,14,60,at);S(g,0,24,14,24);S(g,82,24,96,24);
}
function cCoil(g){g.appendChild(E('path',{d:'M0,120 L14,120 L14,100 L22,100 L22,120 L30,120 L30,100 L38,100 L38,120 L46,120 L46,100 L54,100 L54,120 L62,120 L62,100 L70,100 L70,120 L78,120 L78,100 L86,100 L86,120 L96,120',fill:'none',stroke:'#93c5fd','stroke-width':2.5,'stroke-linecap':'round','stroke-linejoin':'round'}))}

function render(at){
const svg=document.getElementById('cv');
while(svg.children.length>3)svg.removeChild(svg.lastChild);
const g=E('g');

// ═══ BOUNDARY ═══
cat(g,4,'BOUNDARY','#6ee7b7','#10b981');

// Source
const src=E('g',{transform:'translate(24,28)'});
src.appendChild(E('circle',{cx:38,cy:48,r:26,fill:'#10b981',opacity:.12}));
src.appendChild(E('circle',{cx:38,cy:48,r:26,fill:'none',stroke:'#6ee7b7','stroke-width':2.5}));
const fOp=.35+Math.sin(at*Math.PI*2*2)*.2;
src.appendChild(E('line',{x1:24,y1:48,x2:48,y2:48,stroke:'#6ee7b7','stroke-width':2,opacity:fOp}));
src.appendChild(E('polygon',{points:'44,44 52,48 44,52',fill:'#6ee7b7',opacity:fOp}));
S(src,64,48,96,48);lbl(src,48,100,'Source','#6ee7b7');g.appendChild(src);

// Atm Intake — bell mouth with wind streaks
const ai=E('g',{transform:'translate(148,28)'});
ai.appendChild(E('path',{d:'M4,10 Q2,48 4,86 L56,66 Q62,48 56,30 Z',fill:'#10b981',opacity:.10}));
ai.appendChild(E('path',{d:'M4,10 L56,30 Q62,48 56,66 L4,86',fill:'none',stroke:'#6ee7b7','stroke-width':2.5,'stroke-linejoin':'round'}));
// Wind streaks
const aiPh2=((at*2.5)%1);
[0,0.2,0.4,0.6,0.8].forEach((ph,i)=>{
  const p=((aiPh2+ph)%1);
  const sx=-10+p*60;
  const yOff=(i-2)*14;
  const sy=48+yOff*(1-p*0.6);
  const op=p<0.2?p*4:p>0.8?(1-p)*4:0.4;
  if(op>0.02){
    ai.appendChild(E('line',{x1:sx-6,y1:sy,x2:sx,y2:sy,stroke:'#6ee7b7','stroke-width':1.5,'stroke-linecap':'round',opacity:op}));
    ai.appendChild(E('polygon',{points:`${sx},${sy-2} ${sx+3},${sy} ${sx},${sy+2}`,fill:'#6ee7b7',opacity:op*0.6}));
  }
});
S(ai,56,48,96,48);lbl(ai,48,100,'Atm. Intake','#6ee7b7');g.appendChild(ai);

// Sink
const sk=E('g',{transform:'translate(272,28)'});
sk.appendChild(E('path',{d:'M36,8 L36,72 L60,72 L60,8 Z',fill:'#10b981',opacity:.08}));
['M36,72 L36,8','M60,72 L60,8'].forEach(d=>sk.appendChild(E('path',{d,fill:'none',stroke:'#6ee7b7','stroke-width':2.5})));
sk.appendChild(E('line',{x1:30,y1:72,x2:66,y2:72,stroke:'#6ee7b7','stroke-width':2}));
sk.appendChild(E('line',{x1:32,y1:8,x2:64,y2:8,stroke:'#6ee7b7','stroke-width':2}));
sk.appendChild(E('path',{d:'M30,4 L48,0 L66,4',fill:'none',stroke:'#6ee7b7','stroke-width':1.5,opacity:.6}));
sk.appendChild(E('line',{x1:30,y1:72,x2:26,y2:82,stroke:'#6ee7b7','stroke-width':1.5}));
sk.appendChild(E('line',{x1:66,y1:72,x2:70,y2:82,stroke:'#6ee7b7','stroke-width':1.5}));
sk.appendChild(E('line',{x1:26,y1:82,x2:70,y2:82,stroke:'#6ee7b7','stroke-width':2}));
S(sk,0,48,36,48);
lbl(sk,48,100,'Sink','#6ee7b7');g.appendChild(sk);

// Reservoir
const rs=E('g',{transform:'translate(396,28)'});
rs.appendChild(E('line',{x1:12,y1:72,x2:68,y2:72,stroke:'#6ee7b7','stroke-width':2,opacity:.4}));
[16,28,40,52].forEach(x=>rs.appendChild(E('line',{x1:x,y1:76,x2:x+8,y2:84,stroke:'#6ee7b7','stroke-width':.8,opacity:.12})));

[62,50].forEach(y=>{rs.appendChild(E('circle',{cx:40,cy:y,r:5,fill:'#10b981',opacity:.15}));rs.appendChild(E('circle',{cx:40,cy:y,r:5,fill:'none',stroke:'#6ee7b7','stroke-width':2}))});

rs.appendChild(E('line',{x1:30,y1:38,x2:14,y2:38,stroke:'#6ee7b7','stroke-width':3}));
rs.appendChild(E('circle',{cx:22,cy:38,r:4,fill:'none',stroke:'#6ee7b7','stroke-width':1.5}));
rs.appendChild(E('rect',{x:8,y:34,width:4,height:8,rx:1,fill:'#6ee7b7',opacity:.15}));
rs.appendChild(E('line',{x1:50,y1:38,x2:68,y2:38,stroke:'#6ee7b7','stroke-width':3}));
rs.appendChild(E('circle',{cx:58,cy:38,r:4,fill:'none',stroke:'#6ee7b7','stroke-width':1.5}));
S(rs,68,38,72,38);S(rs,72,38,72,48);S(rs,72,48,96,48);
rs.appendChild(E('line',{x1:40,y1:34,x2:40,y2:16,stroke:'#6ee7b7','stroke-width':4}));
rs.appendChild(E('circle',{cx:40,cy:20,r:4,fill:'none',stroke:'#6ee7b7','stroke-width':1.5}));
rs.appendChild(E('rect',{x:36,y:8,width:8,height:6,rx:2,fill:'none',stroke:'#6ee7b7','stroke-width':1.5}));
[0,.4,.7].forEach(ph=>{const p=((at/.6+ph)%1),wy=4-p*12,wo=p<.5?.2:.2*(1-(p-.5)/.5);if(wo>.01)rs.appendChild(E('circle',{cx:38+Math.sin(ph*10)*4,cy:wy,r:1.5,fill:'#6ee7b7',opacity:wo}))});
lbl(rs,48,100,'Reservoir','#6ee7b7');g.appendChild(rs);

// ═══ PRESSURE ═══
cat(g,148,'PRESSURE','#c4b5fd','#8b5cf6');

// Pump
const pm=E('g',{transform:'translate(24,168)'});
pm.appendChild(E('circle',{cx:48,cy:46,r:24,fill:'#8b5cf6',opacity:.10}));
pm.appendChild(E('circle',{cx:48,cy:46,r:24,fill:'none',stroke:'#c4b5fd','stroke-width':2.5}));
// Inlet (left, into casing)
S(pm,0,48,24,48);
// Discharge (top of casing, tangential — routes right then down to port)
pm.appendChild(E('line',{x1:48,y1:22,x2:72,y2:22,stroke:'#c4b5fd','stroke-width':2.5}));
pm.appendChild(E('line',{x1:72,y1:22,x2:72,y2:48,stroke:'#c4b5fd','stroke-width':2.5}));
S(pm,72,48,96,48);
// Electrical (top)
S(pm,48,22,48,0,1);
// Impeller
const pa=((at*2.5)%1)*360,piG=E('g',{transform:`rotate(${pa.toFixed(1)},48,46)`});
piG.appendChild(E('path',{d:'M38,36 A14,14 0 0,1 58,36',fill:'none',stroke:'#c4b5fd','stroke-width':1.5,opacity:.6}));
piG.appendChild(E('path',{d:'M38,56 A14,14 0 0,1 58,56',fill:'none',stroke:'#c4b5fd','stroke-width':1.5,opacity:.6}));
piG.appendChild(E('line',{x1:48,y1:34,x2:48,y2:58,stroke:'#c4b5fd','stroke-width':1.5,opacity:.5}));
piG.appendChild(E('line',{x1:36,y1:46,x2:60,y2:46,stroke:'#c4b5fd','stroke-width':1.5,opacity:.5}));pm.appendChild(piG);
// Base
pm.appendChild(E('polygon',{points:'36,70 60,70 64,80 32,80',fill:'none',stroke:'#c4b5fd','stroke-width':2,opacity:.5}));
pm.appendChild(E('line',{x1:28,y1:80,x2:68,y2:80,stroke:'#c4b5fd','stroke-width':2,opacity:.5}));
lbl(pm,48,100,'Pump','#c4b5fd');g.appendChild(pm);

// Compressor
const cm=E('g',{transform:'translate(148,168)'});
cm.appendChild(E('rect',{x:10,y:10,width:76,height:70,rx:6,fill:'#8b5cf6',opacity:.08}));
cm.appendChild(E('rect',{x:10,y:22,width:56,height:42,rx:4,fill:'none',stroke:'#c4b5fd','stroke-width':2.5}));
const cpPh=((at*1.5)%1),cpX=32+Math.sin(cpPh*Math.PI*2)*6;
cm.appendChild(E('rect',{x:cpX,y:28,width:6,height:30,rx:1.5,fill:'#c4b5fd',opacity:.2}));
cm.appendChild(E('rect',{x:cpX,y:28,width:6,height:30,rx:1.5,fill:'none',stroke:'#c4b5fd','stroke-width':2,opacity:.5}));
const ckA=cpPh*Math.PI*2;cm.appendChild(E('line',{x1:cpX+6,y1:43,x2:74+Math.cos(ckA)*5,y2:43+Math.sin(ckA)*5,stroke:'#c4b5fd','stroke-width':1.5,opacity:.3}));

S(cm,0,48,10,34);S(cm,66,36,96,48);cm.appendChild(E('line',{x1:74,y1:35,x2:74,y2:14,stroke:'#c4b5fd','stroke-width':2,opacity:.3}));S(cm,74,14,48,0,1);
cm.appendChild(E('line',{x1:14,y1:68,x2:82,y2:68,stroke:'#c4b5fd','stroke-width':1.5,opacity:.3}));
lbl(cm,48,100,'Compressor','#c4b5fd');g.appendChild(cm);

// Valve
const vl=E('g',{transform:'translate(272,168)'});
vl.appendChild(E('polygon',{points:'26,30 48,48 26,66',fill:'#8b5cf6',opacity:.07}));
vl.appendChild(E('polygon',{points:'70,30 48,48 70,66',fill:'#8b5cf6',opacity:.07}));

vl.appendChild(E('line',{x1:38,y1:22,x2:58,y2:22,stroke:'#c4b5fd','stroke-width':2.5}));
S(vl,0,48,26,48);S(vl,70,48,96,48);lbl(vl,48,100,'Valve','#c4b5fd');g.appendChild(vl);

const hOp=.2+Math.sin(at*Math.PI*2*2)*.1;
[[28,34,40,42],[28,62,40,54],[56,42,68,34],[56,54,68,62]].forEach(([x1,y1,x2,y2])=>rt.appendChild(E('line',{x1,y1,x2,y2,stroke:'#c4b5fd','stroke-width':1,opacity:hOp})));
S(rt,0,48,40,48);S(rt,56,48,96,48);lbl(rt,48,100,'Restriction','#c4b5fd');g.appendChild(rt);

const gt=E('g',{transform:'translate(520,168)'});

gt.appendChild(E('rect',{x:18,y:20,width:60,height:48,rx:6,fill:'none',stroke:'#c4b5fd','stroke-width':2.5}));

gt.appendChild(E('line',{x1:48,y1:44,x2:48,y2:68,stroke:'#c4b5fd','stroke-width':2.5}));
S(gt,0,48,18,44);S(gt,78,44,96,48);S(gt,48,68,48,96,1);
gt.appendChild(E('line',{x1:22,y1:68,x2:74,y2:68,stroke:'#c4b5fd','stroke-width':1.5,opacity:.4}));

// Diaphragm Compressor 2×3
const dc=E('g',{transform:'translate(644,168)'});
cnt(dc,-2,-2,100,148,'#c4b5fd');

dc.appendChild(E('path',{d:`M20,42 Q36,${42-dA} 48,${42-dA} Q60,${42-dA} 76,42`,fill:'none',stroke:'#c4b5fd','stroke-width':2.5,opacity:.6}));
const dbP=((at/.5)%1);[[-4,0],[6,.35],[-2,.7]].forEach(([ox,ph])=>{const p=((dbP+ph)%1),by=36-p*18,bo=p<.7?.3:.3*(1-(p-.7)/.3);if(bo>.02)dc.appendChild(E('circle',{cx:48+ox,cy:by,r:2.5,fill:'none',stroke:'#c4b5fd','stroke-width':1.2,opacity:bo}))});
dc.appendChild(E('rect',{x:32,y:52,width:32,height:14,rx:2,fill:'#c4b5fd',opacity:.08,stroke:'#c4b5fd','stroke-width':1.5,opacity:.4}));
S(dc,0,48,16,28);S(dc,80,28,96,48);cCoil(dc);
dc.appendChild(E('line',{x1:48,y1:76,x2:48,y2:130,stroke:'#c4b5fd','stroke-width':1.5,opacity:.3}));
dc.appendChild(E('circle',{cx:48,cy:132,r:5,fill:'none',stroke:'#c4b5fd','stroke-width':1.5,opacity:.3}));
S(dc,48,137,48,144,1);lbl(dc,48,162,'Diaph. Comp.','#c4b5fd');g.appendChild(dc);

// ═══ HEAT TRANSFER ═══
cat(g,336,'HEAT TRANSFER','#93c5fd','#3b82f6');

// Electric Heater
const eh=E('g',{transform:'translate(24,356)'});
eh.appendChild(E('rect',{x:14,y:28,width:68,height:40,rx:6,fill:'#3b82f6',opacity:.08}));

const hgOp=.35+Math.sin(((at/.8)%1)*Math.PI*2)*.2;
eh.appendChild(E('path',{d:'M22,48 L28,36 L34,60 L40,36 L46,60 L52,36 L58,60 L64,36 L70,48',fill:'none',stroke:'#fca5a5','stroke-width':2.5,'stroke-linejoin':'round',opacity:hgOp}));
S(eh,0,48,14,48);S(eh,82,48,96,48);S(eh,48,0,48,28,1);lbl(eh,48,100,'Electric Heater','#93c5fd');g.appendChild(eh);

// Air Cooler
const ac=E('g',{transform:'translate(148,356)'});
cnt(ac,-2,-2,100,100,'#93c5fd');
ac.appendChild(E('rect',{x:12,y:16,width:72,height:30,rx:4,fill:'#3b82f6',opacity:.08}));
ac.appendChild(E('rect',{x:12,y:16,width:72,height:30,rx:4,fill:'none',stroke:'#93c5fd','stroke-width':2.5}));
[24,36,48,60,72].forEach(x=>ac.appendChild(E('line',{x1:x,y1:20,x2:x,y2:42,stroke:'#93c5fd','stroke-width':1,opacity:.25})));
ac.appendChild(E('circle',{cx:48,cy:66,r:16,fill:'none',stroke:'#93c5fd','stroke-width':2}));

function frame(now){
if(C.mode==='playing'){const d=now-C._lw;C._lw=now;C._ac+=d;const ms=PS[C.sp];while(C._ac>=ms){C.t+=C.dt;C.f++;C._ac-=ms}}
document.getElementById('tv').textContent=C.t.toFixed(0);document.getElementById('fv').textContent=C.f;
let vt=C.t;if(C.mode==='playing'){vt=C.t+(C._ac/PS[C.sp])*C.dt}
render(vt/C.dt);requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
